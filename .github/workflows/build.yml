name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-36" "build-tools;34.0.0"
        yes | sdkmanager --licenses

    - name: Set up local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

    - name: Grant execute permission to gradlew
      run: chmod +x android/gradlew

    - name: Install Node.js dependencies
      run: npm ci

    - name: Sync Capacitor Android project
      run: npx cap sync android

    - name: Build Debug APK
      run: cd android && ./gradlew --no-daemon assembleDebug

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: |
          android/app/build/outputs/apk/debug/*.apk
        retention-days: 14

    - name: Display APK sizes
      run: |
        echo "APK files built:"
        ls -lh android/app/build/outputs/apk/debug/
      if: always()
